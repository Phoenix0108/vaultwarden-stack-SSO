# =============================================================================
# Blueprint Authentik — Source Kerberos SPNEGO + redirection auto sur le flow
# de connexion par defaut.
# -----------------------------------------------------------------------------
# A importer via Admin > System > Blueprints (ou `ak import_blueprint`).
# Ne couvre PAS l'upload du keytab (binaire, secret) : celui-ci reste une
# action manuelle post-import (cf. deploy/authentik/README.md, etape 1).
# Placeholders a substituer AVANT import : <KERBEROS_SOURCE_SLUG> peut rester
# tel quel, <CLIENT_SUBNET> DOIT etre remplace par le CIDR reel du LAN client.
# -----------------------------------------------------------------------------
# Mecanique de redirection (verifiee contre le code source authentik, apres
# plusieurs tentatives infructueuses par simple lecture de doc) :
#  - Il n'existe PAS de fonction "ak_create_flow_link_url" dans l'evaluateur
#    d'expressions Authentik (authentik/lib/expression/evaluator.py et
#    authentik/policies/expression/evaluator.py, verifies directement) --
#    une Expression Policy ne peut renvoyer qu'un booleen (PolicyResult.passing),
#    jamais une URL de redirection.
#  - La redirection reelle passe par un Redirect Stage (authentik_stages_redirect
#    .redirectstage, mode "static") insere AVANT le stage d'identification
#    (order plus bas), avec la policy IP en gate sur CE stage : hors subnet,
#    le stage de redirection est simplement saute (policy=False) et le flow
#    continue normalement vers l'identification/formulaire password.
#  - URL de la Source Kerberos verifiee dans authentik/sources/kerberos/urls.py
#    (pattern "<slug>/") + apps.py (mountpoint "source/kerberos/") :
#    /source/kerberos/<slug>/ -- PAS de suffixe /login/, ce n'est ni
#    "oauth-client-login" ni un nom invente.
# =============================================================================
version: 1
metadata:
  name: "Kerberos SPNEGO SSO - Vaultwarden"
entries:
  # ---------------------------------------------------------------------------
  # 1. Source Kerberos. Le champ "keytab" reste vide ici (secret) : a coller en
  #    base64 dans l'UI apres import (Directory > Federation & Social login >
  #    Kerberos SPNEGO SSO). Ne JAMAIS committer le contenu du keytab.
  # ---------------------------------------------------------------------------
  - model: authentik_sources_kerberos.kerberossource
    id: kerberos-source
    identifiers:
      slug: kerberos-sso
    attrs:
      name: "Kerberos SPNEGO SSO"
      enabled: true
      realm: "VAULTWARDENSSO.LOCAL"
      spnego_server_name: "HTTP/auth.vaultwardensso.local"
      spnego_keytab: ""              # a renseigner manuellement (base64), jamais en clair dans ce fichier
      # krb5_conf vide = "config systeme par defaut" (doc officielle), qui n'a AUCUN
      # default_realm dans un conteneur Authentik generique. Confirme en lab : sans ce
      # bloc, la recherche de l'entree keytab se fait avec un royaume vide au lieu de
      # VAULTWARDENSSO.LOCAL -> "No key table entry found matching HTTP/auth.../@"
      # (royaume vide apres le @) alors que le keytab contient bien l'entree avec le
      # royaume explicite. dns_lookup_* a false : le DNS du host Docker (non domain-joint)
      # ne resout pas les enregistrements SRV Kerberos, autant s'appuyer uniquement sur
      # les entrees statiques ci-dessous plutot que de risquer un echec de resolution.
      # rdns/dns_canonicalize_hostname a false : MIT krb5 tente par defaut de
      # canonicaliser le nom d'hote du service (spnego_server_name) via DNS avant
      # de chercher l'entree keytab -- authentik-server n'a aucune raison de savoir
      # resoudre auth.vaultwardensso.local (alias reseau propre a Caddy, sur un
      # reseau Docker dont authentik-server ne fait pas partie), donc cette
      # canonicalisation echoue ou part de travers et peut a elle seule expliquer
      # un "No key table entry found" meme avec un keytab et un royaume corrects.
      krb5_conf: |
        [libdefaults]
            default_realm = VAULTWARDENSSO.LOCAL
            dns_lookup_realm = false
            dns_lookup_kdc = false
            rdns = false
            dns_canonicalize_hostname = false
        [realms]
            VAULTWARDENSSO.LOCAL = {
                kdc = 192.168.100.76
                admin_server = 192.168.100.76
            }
        [domain_realm]
            .vaultwardensso.local = VAULTWARDENSSO.LOCAL
            vaultwardensso.local = VAULTWARDENSSO.LOCAL
      password_login_update_internal_password: false
      sync_users: false              # provisioning = monopole de la source LDAP existante (OU=Vaultwarden)
      sync_users_password: false
      user_matching_mode: "username_deny"   # apparie sur username/sAMAccountName ; DENY si inconnu -> jamais de creation
      user_path_template: "goauthentik.io/sources/%(slug)s"

  # ---------------------------------------------------------------------------
  # 2. Expression Policy : simple gate booleen (True = client intranet). Ne
  #    fait plus que ca -- la redirection elle-meme est geree par le Redirect
  #    Stage ci-dessous, pas par cette policy.
  # ---------------------------------------------------------------------------
  - model: authentik_policies_expression.expressionpolicy
    id: kerberos-redirect-policy
    identifiers:
      name: "redirect-kerberos-if-intranet"
    attrs:
      expression: |
        # Renvoie True uniquement si le client semble venir du LAN intranet.
        # <CLIENT_SUBNET> = CIDR reel a substituer avant import (ex: 192.168.100.0/24).
        # Tout le corps est dans un seul try/except : une erreur ICI (placeholder
        # non substitue, CIDR invalide, etc.) ne doit JAMAIS bloquer le flow de
        # connexion (deja vecu : une erreur non catchee ici a fait echouer
        # l'identification pour tout le monde, mot de passe inclus) -- on
        # degrade toujours vers False (le stage de redirection est simplement
        # saute, le flow continue normalement).
        # REMOTE_ADDR n'est PAS fiable ici (confirme en lab : toujours None) --
        # tout passe par Caddy (reverse proxy interne), donc c'est X-Forwarded-For
        # qu'il faut lire. Caddy ecrase toujours cet en-tete avec la vraie IP TCP
        # du client (reverse_proxy ne relaie jamais un X-Forwarded-For fourni par
        # le client lui-meme) : safe a lire directement, pas de risque de spoof
        # tant qu'authentik-server n'est joignable que via Caddy (authentik_proxy,
        # internal=true).
        import ipaddress

        try:
            client_subnet = ipaddress.ip_network("<CLIENT_SUBNET>")
            xff = request.http_request.META.get("HTTP_X_FORWARDED_FOR", "")
            remote_ip = xff.split(",")[0].strip() if xff else request.http_request.META.get("REMOTE_ADDR", "")
            in_subnet = ipaddress.ip_address(remote_ip) in client_subnet
        except ValueError:
            in_subnet = False

        return in_subnet

  # ---------------------------------------------------------------------------
  # 3. Redirect Stage : URL statique vers la Source Kerberos. Le slug est connu
  #    au moment du blueprint (kerberos-sso, identifiers.slug ci-dessus) donc
  #    l'URL est fixe, pas besoin de la calculer dynamiquement.
  # ---------------------------------------------------------------------------
  - model: authentik_stages_redirect.redirectstage
    id: kerberos-redirect-stage
    identifiers:
      name: "kerberos-auto-redirect"
    attrs:
      mode: "static"
      target_static: "/source/kerberos/kerberos-sso/"
      keep_context: false

  # ---------------------------------------------------------------------------
  # 4. Binding du Redirect Stage sur le flow par defaut, AVANT le stage
  #    d'identification existant (order plus bas -- celui-ci est generalement
  #    a 10, verifier avant import si votre installation differe). evaluate_on_plan
  #    force l'evaluation de la policy des la planification du flow, avant meme
  #    l'affichage du premier stage -- essentiel pour un redirect "silencieux"
  #    (sinon l'identification pourrait s'afficher brievement avant la redirection).
  # ---------------------------------------------------------------------------
  - model: authentik_flows.flowstagebinding
    id: kerberos-redirect-stage-binding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      stage: !KeyOf kerberos-redirect-stage
      order: 5
    attrs:
      policy_engine_mode: "any"
      evaluate_on_plan: true
      re_evaluate_policies: true

  - model: authentik_policies.policybinding
    id: kerberos-redirect-policy-binding
    identifiers:
      target: !KeyOf kerberos-redirect-stage-binding
      policy: !KeyOf kerberos-redirect-policy
      order: 0
    attrs:
      enabled: true
      negate: false
      timeout: 30
