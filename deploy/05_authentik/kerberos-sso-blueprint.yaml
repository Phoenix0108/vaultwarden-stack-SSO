# =============================================================================
# Blueprint Authentik — Source Kerberos SPNEGO + redirection auto sur le flow
# de connexion par defaut.
# -----------------------------------------------------------------------------
# A importer via Admin > System > Blueprints (ou `ak import_blueprint`).
# Ne couvre PAS l'upload du keytab (binaire, secret) : celui-ci reste une
# action manuelle post-import (cf. deploy/05_authentik/README.md, etape 1).
# -----------------------------------------------------------------------------
# CE FICHIER EST UN TEMPLATE : ne jamais l'importer tel quel. Les placeholders
# ci-dessous (<REALM>, <DC_IP>, <DOMAIN_DNS>, <CLIENT_SUBNETS_PYLIST>) sont
# substitues automatiquement depuis deploy/environment.env par :
#   deploy/05_authentik/render-blueprint.sh
# (lit REALM, DC_IP, DOMAIN_DNS, CLIENT_SUBNETS -- voir
# deploy/00_environment.env.example pour le format). Produit
# kerberos-sso-blueprint.rendered.yaml (jamais versionne), c'est CE fichier
# rendu qu'il faut importer, jamais le template source. CLIENT_SUBNETS accepte
# une liste de CIDR separes par des virgules : plusieurs reseaux/VLAN clients
# (LAN filaire, WiFi corporate, VPN site-to-site, autre site AD...) peuvent
# ainsi declencher la redirection Kerberos automatique, pas un seul.
# -----------------------------------------------------------------------------
# Mecanique de redirection (verifiee contre le code source authentik, apres
# plusieurs tentatives infructueuses par simple lecture de doc) :
#  - Il n'existe PAS de fonction "ak_create_flow_link_url" dans l'evaluateur
#    d'expressions Authentik (authentik/lib/expression/evaluator.py et
#    authentik/policies/expression/evaluator.py, verifies directement) --
#    une Expression Policy ne peut renvoyer qu'un booleen (PolicyResult.passing),
#    jamais une URL de redirection.
#  - La redirection reelle passe par un Redirect Stage (authentik_stages_redirect
#    .redirectstage, mode "static") insere AVANT le stage d'identification
#    (order plus bas), avec la policy IP en gate sur CE stage : hors subnet,
#    le stage de redirection est simplement saute (policy=False) et le flow
#    continue normalement vers l'identification/formulaire password.
#  - URL de la Source Kerberos verifiee dans authentik/sources/kerberos/urls.py
#    (pattern "<slug>/") + apps.py (mountpoint "source/kerberos/") :
#    /source/kerberos/<slug>/ -- PAS de suffixe /login/, ce n'est ni
#    "oauth-client-login" ni un nom invente.
# =============================================================================
version: 1
metadata:
  name: "Kerberos SPNEGO SSO - Vaultwarden"
entries:
  # ---------------------------------------------------------------------------
  # 1. Source Kerberos. Le champ "keytab" reste vide ici (secret) : a coller en
  #    base64 dans l'UI apres import (Directory > Federation & Social login >
  #    Kerberos SPNEGO SSO). Ne JAMAIS committer le contenu du keytab.
  # ---------------------------------------------------------------------------
  - model: authentik_sources_kerberos.kerberossource
    id: kerberos-source
    identifiers:
      slug: kerberos-sso
    attrs:
      name: "Kerberos SPNEGO SSO"
      enabled: true
      # Flow declenche apres une authentification SPNEGO reussie pour finaliser la
      # connexion (etablir la session). Jamais renseigne dans les versions precedentes
      # de ce blueprint -- reste a null par defaut, d'ou "Bad Request: Le flux configure
      # n'existe pas" confirme en lab juste apres un login SPNEGO pourtant accepte.
      # default-source-authentication = flow standard livre par defaut avec Authentik
      # pour ce role (authentification d'un utilisateur existant via une source).
      authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]
      realm: "<REALM>"
      # spnego_server_name VOLONTAIREMENT VIDE -- ne pas renseigner "HTTP/auth.vaultwardensso.local"
      # ici. Diagnostic complet en lab (via ak shell, cf. historique de commits) : le code
      # d'Authentik (get_gssapi_creds) construit un gssapi.names.Name(..., name_type=
      # NameType.hostbased_service) des que ce champ est renseigne, et CETTE construction
      # specifique echoue systematiquement a trouver l'entree du keytab dans cet environnement
      # ("No key table entry found matching HTTP/auth.../@"), meme avec un keytab prouve
      # byte-a-byte correct (bon principal, bon realm, bon kvno, bon enctype, bon name_type
      # KRB5_NT_SRV_HST). Teste et confirme : la MEME acquisition de credentials reussit
      # parfaitement (retourne HTTP/auth.vaultwardensso.local@VAULTWARDENSSO.LOCAL) des que le
      # name est soit un principal complet explicite (name_type=kerberos_principal), soit --
      # cas qui nous interesse ici -- name=None, laissant gssapi essayer directement les
      # entrees du keytab. La doc officielle Authentik confirme ce comportement : "If not
      # specified, the server name defaults to trying out all entries in the keytab/credentials
      # cache until a valid server name is found." Notre keytab n'ayant qu'une seule entree,
      # cette auto-detection est sans ambiguite. Root cause probable : bug/incompatibilite de
      # cette fonctionnalite encore marquee "in preview" dans l'UI Authentik au moment de la
      # redaction -- a revalider sur une version ulterieure d'Authentik avant de retenter de
      # renseigner ce champ explicitement.
      spnego_server_name: ""
      spnego_keytab: ""              # a renseigner manuellement (base64), jamais en clair dans ce fichier
      # krb5_conf : realme/KDC explicites plutot que la config systeme par defaut (qui n'a
      # aucun default_realm dans un conteneur Authentik generique). N'est plus la cause du
      # probleme decrit ci-dessus (isole et corrige via spnego_server_name), mais reste une
      # bonne pratique : dns_lookup_* et rdns/dns_canonicalize_hostname a false car le host
      # Docker (non domain-joint) ne resout pas les enregistrements DNS de la zone AD --
      # autant s'appuyer uniquement sur les entrees statiques ci-dessous.
      # Un seul KDC (kdc=) est renseigne ici par le render script -- site AD
      # unique. Plusieurs sites/KDC secondaires : ajouter des lignes "kdc = ..."
      # supplementaires a la main dans le fichier rendu (kerberos-sso-blueprint
      # .rendered.yaml) avant import, une par KDC.
      krb5_conf: |
        [libdefaults]
            default_realm = <REALM>
            dns_lookup_realm = false
            dns_lookup_kdc = false
            rdns = false
            dns_canonicalize_hostname = false
        [realms]
            <REALM> = {
                kdc = <DC_IP>
                admin_server = <DC_IP>
            }
        [domain_realm]
            .<DOMAIN_DNS> = <REALM>
            <DOMAIN_DNS> = <REALM>
      password_login_update_internal_password: false
      sync_users: false              # provisioning = monopole de la source LDAP existante (OU=Vaultwarden)
      sync_users_password: false
      # username_link (PAS username_deny) : relie au compte existant par username --
      # confirme en lab que "deny" signifie "refuse de RELIER" (deny enrollment when
      # username already exists), l'inverse de l'intention initiale de ce projet.
      # sync_users=false empeche toute creation de compte quel que soit le mode --
      # username_link reste donc sans danger : jamais de nouveau compte, uniquement
      # une liaison vers un compte deja provisionne par la source LDAP.
      user_matching_mode: "username_link"
      user_path_template: "goauthentik.io/sources/%(slug)s"

  # ---------------------------------------------------------------------------
  # 2. Expression Policy : simple gate booleen (True = client intranet). Ne
  #    fait plus que ca -- la redirection elle-meme est geree par le Redirect
  #    Stage ci-dessous, pas par cette policy.
  # ---------------------------------------------------------------------------
  - model: authentik_policies_expression.expressionpolicy
    id: kerberos-redirect-policy
    identifiers:
      name: "redirect-kerberos-if-intranet"
    attrs:
      expression: |
        # Renvoie True uniquement si (a) le client vient de l'UN des reseaux
        # clients autorises ET (b) la connexion est pilotee par une application
        # OAuth2 (Vaultwarden), pas un acces direct a l'interface Authentik.
        # <CLIENT_SUBNETS_PYLIST> = liste Python de CIDR substituee avant import
        # par render-blueprint.sh depuis CLIENT_SUBNETS (deploy/environment.env,
        # CSV) -- ex: ["192.168.100.0/24", "10.20.30.0/24"]. Plusieurs
        # reseaux/VLAN (LAN filaire, WiFi corporate, VPN site-to-site, autre
        # site AD...) sont donc supportes nativement, pas un seul CIDR fige.
        #
        # INCIDENT VECU : cette policy est bindee sur default-authentication-flow,
        # qui est PARTAGE par TOUS les logins Authentik -- y compris akadmin et
        # l'acces direct a /if/admin/. Sans le filtre (b) ci-dessous, un
        # administrateur sur le LAN se faisait rediriger vers la source Kerberos
        # comme n'importe quel utilisateur Vaultwarden, avec echec puisque
        # akadmin n'est pas un compte AD -- verrouillage total de l'admin, corrige
        # en urgence en supprimant le stage/binding en base (ak shell). Le filtre
        # (b) distingue les deux cas via la presence de client_id/response_type
        # dans l'URL : uniquement present quand un Provider OAuth2 (Vaultwarden)
        # redirige vers /if/flow/.../?response_type=code&client_id=..., jamais
        # pour une visite directe de /if/admin/ ou de la page de login generique.
        # ATTENTION : au moment ou cette policy s'evalue (stage de redirection,
        # avant identification), Authentik a deja reecrit la requete et englobe
        # la query string d'origine ENTIERE dans un unique parametre nomme
        # "query" (ex: ?query=response_type%3Dcode%26client_id%3D...) -- confirme
        # en lab par un print de debug. client_id n'est donc JAMAIS trouvable
        # directement dans request.http_request.GET a ce stade ; il faut le
        # decoder depuis l'interieur de ce parametre "query" imbrique. On garde
        # aussi la lecture directe en repli, au cas ou une version d'Authentik
        # future cesse d'envelopper ainsi la requete.
        #
        # Tout le corps est dans un seul try/except : une erreur ICI (placeholder
        # non substitue, CIDR invalide, etc.) ne doit JAMAIS bloquer le flow de
        # connexion (deja vecu : une erreur non catchee a fait echouer
        # l'identification pour tout le monde, mot de passe inclus) -- on
        # degrade toujours vers False (le stage de redirection est simplement
        # saute, le flow continue normalement).
        # REMOTE_ADDR n'est PAS fiable ici (confirme en lab : toujours None) --
        # tout passe par Caddy (reverse proxy interne), donc c'est X-Forwarded-For
        # qu'il faut lire. Caddy ecrase toujours cet en-tete avec la vraie IP TCP
        # du client (reverse_proxy ne relaie jamais un X-Forwarded-For fourni par
        # le client lui-meme) : safe a lire directement, pas de risque de spoof
        # tant qu'authentik-server n'est joignable que via Caddy (authentik_proxy,
        # internal=true).
        import ipaddress
        from urllib.parse import parse_qs

        try:
            client_subnets = [ipaddress.ip_network(cidr) for cidr in <CLIENT_SUBNETS_PYLIST>]
            xff = request.http_request.META.get("HTTP_X_FORWARDED_FOR", "")
            remote_ip = xff.split(",")[0].strip() if xff else request.http_request.META.get("REMOTE_ADDR", "")
            remote_addr = ipaddress.ip_address(remote_ip)
            in_subnet = any(remote_addr in subnet for subnet in client_subnets)

            client_id = request.http_request.GET.get("client_id")
            if not client_id:
                nested_qs = request.http_request.GET.get("query", "")
                client_id = parse_qs(nested_qs).get("client_id", [None])[0]
            is_app_driven_login = bool(client_id)
        except ValueError:
            in_subnet = False
            is_app_driven_login = False

        return in_subnet and is_app_driven_login

  # ---------------------------------------------------------------------------
  # 3. Redirect Stage : URL statique vers la Source Kerberos. Le slug est connu
  #    au moment du blueprint (kerberos-sso, identifiers.slug ci-dessus) donc
  #    l'URL est fixe, pas besoin de la calculer dynamiquement.
  # ---------------------------------------------------------------------------
  - model: authentik_stages_redirect.redirectstage
    id: kerberos-redirect-stage
    identifiers:
      name: "kerberos-auto-redirect"
    attrs:
      mode: "static"
      target_static: "/source/kerberos/kerberos-sso/"
      keep_context: false

  # ---------------------------------------------------------------------------
  # 4. Binding du Redirect Stage sur le flow par defaut, AVANT le stage
  #    d'identification existant (order plus bas -- celui-ci est generalement
  #    a 10, verifier avant import si votre installation differe). evaluate_on_plan
  #    force l'evaluation de la policy des la planification du flow, avant meme
  #    l'affichage du premier stage -- essentiel pour un redirect "silencieux"
  #    (sinon l'identification pourrait s'afficher brievement avant la redirection).
  # ---------------------------------------------------------------------------
  - model: authentik_flows.flowstagebinding
    id: kerberos-redirect-stage-binding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      stage: !KeyOf kerberos-redirect-stage
      order: 5
    attrs:
      policy_engine_mode: "any"
      evaluate_on_plan: true
      re_evaluate_policies: true

  - model: authentik_policies.policybinding
    id: kerberos-redirect-policy-binding
    identifiers:
      target: !KeyOf kerberos-redirect-stage-binding
      policy: !KeyOf kerberos-redirect-policy
      order: 0
    attrs:
      enabled: true
      negate: false
      timeout: 30
