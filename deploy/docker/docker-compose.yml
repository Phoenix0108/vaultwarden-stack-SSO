# =============================================================================
# OIDCWarden + Caddy - déploiement durci (Security by Design)
# -----------------------------------------------------------------------------
# Phase 5 : bascule vaultwarden/server:1.36.0 -> timshel/oidcwarden (SSO OIDC
# Authentik + Trusted Device Encryption). Voir deploy/docs/02_risk_analysis_tde.md
# pour l'analyse de risque TDE et la procédure break-glass AVANT SSO_ONLY=true.
# Hôte Docker NON joint au domaine AD : aucune résolution DNS automatique vers
# la zone vaultwardensso.local. Tout passe par Caddy (vault.* ET auth.*) :
# Vaultwarden résout les deux noms en interne vers le conteneur Caddy via
# l'alias réseau ci-dessous, sans jamais avoir besoin de connaître l'IP reelle
# d'Authentik lui-même — c'est Caddy seul qui a besoin de AUTHENTIK_UPSTREAM
# pour reverse-proxier vers le vrai serveur Authentik.
# Architecture réseau :
#   - frontend         : Caddy <-> extérieur (443/80)
#   - backend           : internal=true -> Vaultwarden joignable UNIQUEMENT via Caddy ;
#                          Caddy y porte aussi l'alias auth.vaultwardensso.local
#   - authentik_egress  : bridge dédié sur Caddy (pas Vaultwarden), seule sortie
#                          autorisée = Authentik:443 (filtrée DOCKER-USER, cf.
#                          deploy/firewall/vw-egress-fw.sh)
# Durcissement conteneur : no-new-privileges, cap_drop ALL, read_only + tmpfs.
# Secrets : ADMIN_TOKEN, SSO_CLIENT_SECRET via .env (hors dépôt versionné).
# =============================================================================
services:
  vaultwarden:
    build:
      context: ./            # image dérivée : Dockerfile embarque la CA racine AD CS + épingle la version OIDCWarden
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: "https://vault.vaultwardensso.local/"
      SIGNUPS_ALLOWED: "false"
      ADMIN_TOKEN: "${VW_ADMIN_TOKEN}"          # depuis .env
      # --- SSO OIDC (Authentik, via Caddy) — noms de variables vérifiés contre SSO.md du fork au moment de la rédaction ---
      SSO_ENABLED: "true"
      SSO_ONLY: "false"                         # NE PASSER A "true" QU'APRES validation du break-glass (gate Phase 5.7)
      SSO_CLIENT_ID: "${VW_SSO_CLIENT_ID}"
      SSO_CLIENT_SECRET: "${VW_SSO_CLIENT_SECRET}"   # pas de variante _FILE dans ce fork : rester sur env var via .env
      SSO_AUTHORITY: "${VW_SSO_AUTHORITY}"      # coller VERBATIM depuis /application/o/<slug>/.well-known/openid-configuration (issuer, casse exacte)
      SSO_SCOPES: "email profile offline_access"
      SSO_SIGNUPS_MATCH_EMAIL: "true"
      SSO_ALLOW_UNKNOWN_EMAIL_VERIFICATION: "false"   # Authentik émet email_verified en booléen JSON valide
      SSO_ORGANIZATIONS_ENABLED: "true"         # mapping groupe AD -> Organization, prérequis TDE
      SSO_TRUSTED_DEVICE_ENCRYPTION: "true"
      SSO_PKCE: "true"
      # --- Journalisation : régime NORMAL (pas de jetons en clair) ---
      LOG_LEVEL: "info"
      # SSO_DEBUG_TOKENS: "true"   # <-- N'ACTIVER QUE pour un diagnostic ponctuel, puis retirer + purger logs
    volumes:
      - ./vw-data:/data/
    networks:
      - backend                       # auth.* ET vault.* resolus ici vers Caddy, aucun egress direct necessaire
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL                          # Vaultwarden n'a besoin d'aucune capability
    read_only: true                  # rootfs immuable ...
    tmpfs:
      - /tmp                         # ... /data (volume) reste le seul point d'écriture
    deploy:
      resources:
        limits:                      # anti-DoS : borne l'impact d'une saturation
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1/alive || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    environment:
      # URL complete (schema+hote+port) du serveur Authentik reel, ex. https://192.168.100.50
      # ou http://192.168.100.50:9000 selon sa config TLS interne. Defaut RFC 5737
      # (TEST-NET-1, jamais routable) applique par le Caddyfile si non renseigne :
      # Caddy demarre normalement, auth.* renvoie une erreur de proxy tant que ce
      # n'est pas configure, plutot que de bloquer tout le stack au demarrage.
      AUTHENTIK_UPSTREAM: "${AUTHENTIK_UPSTREAM:-}"
    ports:
      - "443:443"
      - "443:443/udp"                # HTTP/3
      - "80:80"                      # redirect HTTP -> HTTPS
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro   # vault.crt (SAN vault.* + auth.*) + vault.key (600, root) — AC interne AD CS
      - caddy-data:/data
      - caddy-config:/config
      - ./caddy/logs:/var/log/caddy
    networks:
      frontend: {}
      backend:
        aliases:
          - vault.vaultwardensso.local   # resolution interne sans dependance DNS (hote non domain-joined)
          - auth.vaultwardensso.local    # idem : Vaultwarden atteint Authentik EN PASSANT PAR Caddy
      authentik_egress: {}               # seul Caddy a besoin de joindre le vrai Authentik (voir plus haut)
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE             # nécessaire pour écouter 80/443
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

networks:
  frontend: {}
  backend:
    internal: true                   # Vaultwarden reste injoignable hors Caddy (aucun egress WAN/LAN)
  authentik_egress:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-authentik   # nom d'IF stable pour le pare-feu hôte
    ipam:
      config:
        - subnet: 172.31.10.0/29     # /29 = 6 IP utiles : surface minimale

volumes:
  caddy-data: {}
  caddy-config: {}
