# =============================================================================
# OIDCWarden + Caddy + Authentik — déploiement durci (Security by Design)
# -----------------------------------------------------------------------------
# Phase 5 : bascule vaultwarden/server:1.36.0 -> timshel/oidcwarden (SSO OIDC
# Authentik + Trusted Device Encryption). Voir deploy/docs/02_risk_analysis_tde.md
# pour l'analyse de risque TDE et la procédure break-glass AVANT SSO_ONLY=true.
# Authentik tourne sur la MEME VM, dans ce meme docker-compose (server + worker
# + PostgreSQL + Redis) : plus besoin d'IP LAN ni de regle firewall dediee, tout
# passe par le reseau Docker interne. Caddy reste le seul point d'entree (tout
# passe par Caddy, y compris pour Vaultwarden qui atteint Authentik via Caddy).
# Hôte Docker NON joint au domaine AD : aucune résolution DNS automatique vers
# votre zone AD. Vaultwarden résout VAULT_HOSTNAME ET AUTH_HOSTNAME (définis
# dans .env, cf. .env.example — mêmes valeurs que deploy/environment.env) en
# interne vers le conteneur Caddy via l'alias réseau ci-dessous.
# -----------------------------------------------------------------------------
# Architecture réseau :
#   - frontend           : Caddy <-> extérieur (443/80)
#   - backend             : internal=true -> Vaultwarden joignable UNIQUEMENT via Caddy ;
#                            Caddy y porte aussi les alias VAULT_HOSTNAME/AUTH_HOSTNAME
#   - authentik_proxy     : internal=true -> UNIQUEMENT Caddy <-> authentik-server
#                            (Vaultwarden et le reste d'Authentik n'y ont pas acces)
#   - authentik_internal  : internal=true -> authentik-server/worker <-> postgresql/redis
#                            (jamais expose a Caddy ni a Vaultwarden)
#   - authentik_ldap_egress : NON internal -> authentik-server/worker -> DC (LDAPS 636,
#                            Source LDAP Phase 2bis). Seul reseau non-internal en dehors de
#                            frontend : Docker ne permet pas de restreindre un reseau bridge a
#                            une IP/port precis nativement -- si un filtrage host (DOCKER-USER,
#                            allow uniquement IP_DC:636) est requis, cf. dette de securite dans
#                            README.md (aucun filtrage host applique par defaut ici).
# Durcissement conteneur : no-new-privileges, cap_drop ALL (sauf mention contraire),
# read_only + tmpfs pour Vaultwarden/Caddy. Secrets via .env (hors dépôt versionné).
# =============================================================================
services:
  vaultwarden:
    build:
      context: ./            # image dérivée : Dockerfile embarque la CA racine AD CS + épingle la version OIDCWarden
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: "https://${VAULT_HOSTNAME:?VAULT_HOSTNAME requis dans .env}/"
      SIGNUPS_ALLOWED: "false"
      ADMIN_TOKEN: "${VW_ADMIN_TOKEN}"          # depuis .env
      # --- SSO OIDC (Authentik, via Caddy) — noms de variables vérifiés contre SSO.md du fork au moment de la rédaction ---
      SSO_ENABLED: "true"
      SSO_ONLY: "${VW_SSO_ONLY:-false}"          # NE PASSER A "true" (via .env) QU'APRES avoir verifie que SSO_CLIENT_ID/SECRET/AUTHORITY sont reels (pas CHANGE_ME) ET qu'un login SSO complet fonctionne deja avec ce flag a false -- sinon plus aucune facon de se logger tant que .env n'est pas repasse a false + docker compose up -d
      SSO_CLIENT_ID: "${VW_SSO_CLIENT_ID}"
      SSO_CLIENT_SECRET: "${VW_SSO_CLIENT_SECRET}"   # pas de variante _FILE dans ce fork : rester sur env var via .env
      SSO_AUTHORITY: "${VW_SSO_AUTHORITY}"      # coller VERBATIM depuis /application/o/<slug>/.well-known/openid-configuration (issuer, casse exacte)
      SSO_SCOPES: "email profile offline_access"
      SSO_SIGNUPS_MATCH_EMAIL: "true"
      SSO_ALLOW_UNKNOWN_EMAIL_VERIFICATION: "false"   # Authentik émet email_verified en booléen JSON valide
      SSO_ORGANIZATIONS_ENABLED: "true"         # mapping groupe AD -> Organization, prérequis TDE
      SSO_TRUSTED_DEVICE_ENCRYPTION: "true"
      SSO_PKCE: "true"
      # --- Journalisation : régime NORMAL (pas de jetons en clair) ---
      LOG_LEVEL: "info"
      # SSO_DEBUG_TOKENS: "true"   # <-- N'ACTIVER QUE pour un diagnostic ponctuel, puis retirer + purger logs
    volumes:
      - ./vw-data:/data/
    networks:
      - backend                       # auth.* ET vault.* resolus ici vers Caddy, aucun egress direct necessaire
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL                          # Vaultwarden n'a besoin d'aucune capability
    read_only: true                  # rootfs immuable ...
    tmpfs:
      - /tmp                         # ... /data (volume) reste le seul point d'écriture
    deploy:
      resources:
        limits:                      # anti-DoS : borne l'impact d'une saturation
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1/alive || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    environment:
      VAULT_HOSTNAME: "${VAULT_HOSTNAME:?VAULT_HOSTNAME requis dans .env}"   # lu par le Caddyfile via {$VAULT_HOSTNAME}
      AUTH_HOSTNAME: "${AUTH_HOSTNAME:?AUTH_HOSTNAME requis dans .env}"      # lu par le Caddyfile via {$AUTH_HOSTNAME}
    ports:
      - "443:443"
      - "443:443/udp"                # HTTP/3
      - "80:80"                      # redirect HTTP -> HTTPS
    volumes:
      - ../02_caddy/Caddyfile:/etc/caddy/Caddyfile:ro   # deploy/02_caddy/ est un sibling de deploy/03_docker/, pas un enfant -- ../ obligatoire
      - ../02_caddy/certs:/etc/caddy/certs:ro   # vault.crt (SAN vault.* + auth.*) + vault.key (600, root) — AC interne AD CS
      - caddy-data:/data
      - caddy-config:/config
      - ../02_caddy/logs:/var/log/caddy
    networks:
      frontend: {}
      backend:
        aliases:
          - ${VAULT_HOSTNAME:?VAULT_HOSTNAME requis dans .env}   # resolution interne sans dependance DNS (hote non domain-joined)
          - ${AUTH_HOSTNAME:?AUTH_HOSTNAME requis dans .env}     # idem : Vaultwarden atteint Authentik EN PASSANT PAR Caddy
      authentik_proxy: {}               # seul chemin de Caddy vers authentik-server (nom de service Docker)
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE             # nécessaire pour écouter 80/443
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    depends_on:
      - vaultwarden
      - authentik-server

  # ---------------------------------------------------------------------------
  # Authentik (IdP OIDC + source Kerberos SPNEGO) — meme VM, meme reseau Docker.
  # Jamais expose directement : uniquement reversproxie par Caddy (authentik_proxy).
  # ---------------------------------------------------------------------------
  postgresql:
    image: docker.io/library/postgres:16-alpine
    container_name: authentik-postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${PG_DB:-authentik} -U ${PG_USER:-authentik}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - authentik-database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: "${PG_PASS:?PG_PASS requis dans .env}"
      POSTGRES_USER: "${PG_USER:-authentik}"
      POSTGRES_DB: "${PG_DB:-authentik}"
    networks:
      - authentik_internal
    security_opt:
      - "no-new-privileges:true"

  redis:
    image: docker.io/library/redis:alpine
    container_name: authentik-redis
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - authentik-redis:/data
    networks:
      - authentik_internal
    security_opt:
      - "no-new-privileges:true"

  authentik-server:
    image: "${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.5.2}"
    container_name: authentik-server
    restart: unless-stopped
    command: server
    environment: &authentik-env
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: "${PG_USER:-authentik}"
      AUTHENTIK_POSTGRESQL__NAME: "${PG_DB:-authentik}"
      AUTHENTIK_POSTGRESQL__PASSWORD: "${PG_PASS:?PG_PASS requis dans .env}"
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY:?AUTHENTIK_SECRET_KEY requis dans .env}"
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      # Caddy est le seul point d'entree (tout passe par Caddy) : sans ceci, Authentik voit
      # l'IP du conteneur Caddy sur le reseau authentik_proxy comme REMOTE_ADDR au lieu de
      # l'IP reelle du client transmise via X-Forwarded-For -- la policy de redirection
      # Kerberos (redirect-kerberos-if-intranet, Phase 3) ne peut alors jamais matcher
      # CLIENT_SUBNET. Plage large mais sans risque : ces reseaux sont deja internal=true,
      # aucun acteur externe ne peut se faire passer pour Caddy dessus.
      AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS: "172.16.0.0/12,127.0.0.0/8,::1/128"
      # Pas de config SMTP : hors perimetre (pas de notifications email requises ici).
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
      - authentik-certs:/certs
    networks:
      authentik_internal: {}
      authentik_proxy: {}             # seul point d'entree : Caddy, via ce reseau
      authentik_ldap_egress: {}       # requis pour la Source LDAP (bind/search vers le DC, LDAPS 636)
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - "no-new-privileges:true"
    # Pas de port publie : injoignable autrement que via Caddy (authentik_proxy).

  authentik-worker:
    image: "${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.5.2}"
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    environment: *authentik-env
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
      - authentik-certs:/certs
    networks:
      authentik_internal: {}          # pas besoin d'authentik_proxy : jamais contacte par Caddy
      authentik_ldap_egress: {}       # sync planifiee de la Source LDAP executee par le worker
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - "no-new-privileges:true"
    # Volontairement PAS de montage /var/run/docker.sock : l'integration "outpost
    # gere par Docker" n'est pas utilisee ici (outpost embarque suffit pour ce cas
    # d'usage) -- monter le socket Docker donnerait un acces root-equivalent a
    # l'hote, incompatible avec le moindre privilege de ce projet.

networks:
  frontend: {}
  backend:
    internal: true                   # Vaultwarden reste injoignable hors Caddy (aucun egress WAN/LAN)
  authentik_proxy:
    internal: true                   # Caddy <-> authentik-server uniquement
  authentik_internal:
    internal: true                   # authentik-server/worker <-> postgresql/redis uniquement
  authentik_ldap_egress: {}          # NON internal : authentik-server/worker -> DC (LAN, LDAPS 636) -- cf. commentaire en tete de fichier

volumes:
  caddy-data: {}
  caddy-config: {}
  authentik-database: {}
  authentik-redis: {}
  authentik-media: {}
  authentik-templates: {}
  authentik-certs: {}
